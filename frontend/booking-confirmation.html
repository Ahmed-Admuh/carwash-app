<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Confirmation | Car Wash Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .confirmation-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-soft);
      padding: 2.25rem 1.75rem;
      box-shadow: var(--shadow-sm);
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .confirmation-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--success-tint);
      color: var(--success);
      font-size: 2.2rem;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.1rem;
    }
    .confirmation-title { font-size: 1.4rem; margin-bottom: 0.6rem; color: var(--ink); }
    .confirmation-subtitle { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 1.75rem; }
    .qr-code {
      width: 148px; height: 148px;
      margin: 0 auto 0.9rem;
      background: var(--surface-alt);
      border: 1px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius);
    }
    .booking-details {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border-soft);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.5rem;
    }
    .booking-details h2 { margin-bottom: 0.75rem; color: var(--ink); font-size: 1.1rem; }
    .detail-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border-soft); font-size: 0.9rem; }
    .detail-item:last-child { border-bottom: none; }
    .detail-label { font-weight: 500; color: var(--text-muted); }
    .detail-value { font-weight: 600; color: var(--text); text-align: right; }
    .price-total-value { font-size: 1.1rem; color: var(--teal-dark); }
    .action-stack { display: flex; flex-direction: column; gap: 0.75rem; }
  </style>
</head>
<body class="has-bottom-nav">

<header class="appbar">
  <button class="appbar-btn" onclick="window.history.back()" aria-label="Back"><i class="fas fa-arrow-left"></i></button>
  <div class="appbar-title" data-i18n="confirmation_title_short">Booking Confirmation</div>
</header>

<div class="section" id="pageContent">
  <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading your booking…</p></div>
</div>

<div class="bottom-nav">
  <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span data-i18n="nav_home">Home</span></a>
  <a href="book.html" class="nav-item"><i class="fas fa-search"></i><span data-i18n="nav_search">Search</span></a>
  <a href="about.html" class="nav-item"><i class="fas fa-circle-info"></i><span data-i18n="nav_about">About</span></a>
  <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span data-i18n="nav_profile">Profile</span></a>
</div>

<script src="js/demo-mode.js"></script>
<script src="js/auth.js"></script>
<script src="js/i18n.js"></script>
<script src="js/menu.js"></script>
<script>
  function t(key, fallback) { return window.I18n ? I18n.t(key) : fallback; }

  const params = new URLSearchParams(window.location.search);
  const bookingId = params.get('id');

  document.addEventListener('DOMContentLoaded', async () => {
    if (!bookingId) return renderMissing();
    if (!Auth.isLoggedIn()) {
      window.location.href = `login.html?returnTo=${encodeURIComponent(window.location.pathname + window.location.search)}`;
      return;
    }

    try {
      const booking = await apiFetch(`/bookings/${bookingId}`);
      renderBooking(booking);
    } catch (err) {
      renderMissing();
    }
  });

  function renderMissing() {
    document.getElementById('pageContent').innerHTML = `
      <div class="empty-state">
        <i class="fas fa-receipt"></i>
        <p>We couldn't find this booking.</p>
        <a href="book.html" class="btn" style="display:inline-flex;width:auto;margin-top:1rem;">
          <i class="fas fa-arrow-left"></i> Book a Wash
        </a>
      </div>`;
  }

  const ADDON_NAME_KEYS = {
    "Tire Shine": "addon_tire_shine", "Undercarriage Wash": "addon_undercarriage",
    "Wax Coating": "addon_wax", "Headlight Restoration": "addon_headlight",
    "Engine Bay Clean": "addon_engine_bay", "Pet Hair Removal": "addon_pet_hair",
    "Air Freshener": "addon_air_freshener"
  };
  function addonLabel(name) {
    const key = ADDON_NAME_KEYS[name];
    return key ? t(key, name) : name;
  }
  const STATUS_KEYS = { confirmed: 'bc_status_confirmed', completed: 'bc_status_completed', cancelled: 'bc_status_cancelled' };

  function renderBooking(b) {
    const locale = (window.I18n && I18n.lang === 'ar') ? 'ar' : 'en-US';
    const date = new Date(b.booking_date);
    const dateLabel = date.toLocaleDateString(locale, { year: 'numeric', month: 'long', day: 'numeric' });
    const addons = Array.isArray(b.addons) ? b.addons : (typeof b.addons === 'string' ? JSON.parse(b.addons) : []);
    const addonsLabel = addons.length ? addons.map(a => addonLabel(a.name)).join(', ') : t('bc_none', 'None');
    const washTypeLabel = b.wash_type === 'full' ? t('bd_exterior_interior', 'Exterior + Interior') : t('bd_exterior_only', 'Exterior Only');
    const statusLabel = t(STATUS_KEYS[b.status] || 'bc_status_confirmed', b.status);

    document.getElementById('pageContent').innerHTML = `
      <div class="confirmation-card">
        <div class="confirmation-icon"><i class="fas fa-check"></i></div>
        <h1 class="confirmation-title" data-i18n="confirmation_title">Booking Confirmed!</h1>
        <p class="confirmation-subtitle" data-i18n="confirmation_subtitle">Your appointment has been saved and is ready to go.</p>
        <div class="qr-code">
          <div style="text-align:center;">
            <div style="font-size:0.7rem;margin-bottom:0.5rem;color:var(--text-muted);">${t('bc_booking_id', 'Booking ID')}</div>
            <div style="font-weight:700;letter-spacing:1.5px;color:var(--ink);">${b.booking_ref}</div>
          </div>
        </div>
        <p class="text-muted" style="font-size:0.85rem;">${t('bc_show_code', "Show this code at the car wash, or to the technician if it's a home visit")}</p>
      </div>

      <div class="booking-details">
        <h2 data-i18n="confirmation_details_title">Booking Details</h2>
        <div class="detail-item"><span class="detail-label">${t('bc_label_carwash', 'Car Wash')}</span><span class="detail-value">${b.car_wash_name}</span></div>
        <div class="detail-item"><span class="detail-label">${t('bc_label_washtype', 'Wash Type')}</span><span class="detail-value">${washTypeLabel}</span></div>
        ${b.address ? `<div class="detail-item"><span class="detail-label">${t('bc_label_address', 'Address')}</span><span class="detail-value">${b.address}</span></div>` : ''}
        <div class="detail-item"><span class="detail-label">${t('bc_label_date', 'Date')}</span><span class="detail-value">${dateLabel}</span></div>
        <div class="detail-item"><span class="detail-label">${t('bc_label_time', 'Time')}</span><span class="detail-value">${b.booking_time}</span></div>
        <div class="detail-item"><span class="detail-label">${t('bc_label_addons', 'Add-ons')}</span><span class="detail-value">${addonsLabel}</span></div>
        <div class="detail-item"><span class="detail-label">${t('bc_label_status', 'Status')}</span><span class="detail-value" style="text-transform:capitalize;">${statusLabel}</span></div>
        <div class="detail-item"><span class="detail-label">${t('bc_label_total', 'Total')}</span><span class="detail-value price-total-value">$${parseFloat(b.total_price).toFixed(2)}</span></div>
      </div>

      <div class="action-stack">
        <a href="index.html" class="btn btn-block"><i class="fas fa-home"></i> <span data-i18n="confirmation_back_home">Back to Home</span></a>
        <a href="profile.html#history" class="btn btn-outline btn-block"><i class="fas fa-history"></i> <span data-i18n="bc_view_history">View Order History</span></a>
      </div>
    `;

    if (window.I18n) I18n.applyTranslations();
  }
</script>
</body>
</html>
